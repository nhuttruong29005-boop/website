<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ẩm thực - Xuân Tiền Giang</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="sub-header">
    <h1>Ẩm Thực Ngày Tết Tiền Giang</h1>
</header>

<section class="card-section">

    <div class="food-card">
        <img src="https://cdn.tgdd.vn/2021/01/CookProduct/BeFunky-collage-1200x676.jpg" alt="Bánh tét lá cẩm">
        <div class="food-content">
            <h3>Bánh tét lá cẩm</h3>
            <p>Món bánh đặc trưng miền Tây, tượng trưng cho sự no đủ, 
            thường xuất hiện trong mâm cỗ ngày Tết.</p>
        </div>
    </div>

    <div class="food-card">
        <img src="https://cdn.tgdd.vn/2020/09/CookRecipe/Avatar/xoi-gac-thumbnail.jpg" alt="Xôi Gấc">
        <div class="food-content">
            <h3>Xôi Gấc</h3>
            <p>Món ăn ăn có màu đỏ tượng trưng cho may mắn vào ngày tết.</p>
        </div>
    </div>

    <div class="food-card">
        <img src="https://tse3.mm.bing.net/th/id/OIP.v7a048KWxazxS7V9Bfp6zQHaEK?pid=Api&P=0&h=180" alt="Thịt kho tàu">
        <div class="food-content">
            <h3>Thịt kho tàu</h3>
            <p>Biểu tượng của sự sum vầy, thường ăn kèm dưa giá
            và cơm trắng ngày xuân.</p>
        </div>
    </div>

</section>



</body>
</html>
